version: '3.9'

services:
  # ── PostgreSQL ───────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: mediguide_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: mediguide
      POSTGRES_PASSWORD: mediguide_secret
      POSTGRES_DB: mediguide_ai
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01_schema.sql
      - ./database/seed.sql:/docker-entrypoint-initdb.d/02_seed.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U mediguide -d mediguide_ai"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Express Backend ──────────────────────────────────────
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: mediguide_server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: postgresql://mediguide:mediguide_secret@postgres:5432/mediguide_ai
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      CLIENT_URL: http://localhost:3000
    ports:
      - "5000:5000"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Next.js Frontend ─────────────────────────────────────
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: mediguide_client
    restart: unless-stopped
    depends_on:
      server:
        condition: service_healthy
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:5000
    ports:
      - "3000:3000"

volumes:
  postgres_data:
